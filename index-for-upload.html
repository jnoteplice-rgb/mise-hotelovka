<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6366f1">
<title>Mise: Hotelovka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f172a;
    --bg-soft: #1e293b;
    --card: #1e293b;
    --card-hover: #334155;
    --border: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --primary: #6366f1;
    --primary-hover: #818cf8;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --cj: #ec4899;
    --m: #3b82f6;
    --aj: #10b981;
    --hotel: #f59e0b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
    background-attachment: fixed;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 4px; margin-bottom: 16px;
  }
  .logo {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #f59e0b, #ec4899);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: -0.5px;
  }
  .stats { display: flex; gap: 8px; align-items: center; }
  .stat {
    background: var(--card); padding: 6px 10px; border-radius: 10px;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;
    border: 1px solid var(--border);
  }
  .stat.streak { color: #f59e0b; }
  .stat.xp { color: #a78bfa; }
  .stat.level { color: #10b981; }

  .card {
    background: var(--card); border-radius: 16px; padding: 20px;
    margin-bottom: 12px; border: 1px solid var(--border);
    transition: transform 0.15s, border-color 0.15s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:active { transform: scale(0.98); }

  h1 { font-size: 28px; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
  h2 { font-size: 20px; margin-bottom: 12px; font-weight: 700; }
  h3 { font-size: 16px; font-weight: 700; }
  p { color: var(--text-dim); line-height: 1.5; font-size: 15px; }

  .btn {
    background: var(--primary); color: white; border: none;
    padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; width: 100%; transition: all 0.15s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--primary-hover); }
  .btn.secondary { background: var(--card-hover); }
  .btn.success { background: var(--success); }
  .btn.danger { background: var(--danger); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-group { display: flex; gap: 8px; margin-top: 16px; }
  .btn-group .btn { flex: 1; }

  .hero {
    text-align: center; padding: 32px 16px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.2));
    border-radius: 20px; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .hero .emoji { font-size: 56px; margin-bottom: 12px; }
  .hero h1 { margin-bottom: 12px; }
  .hero p { font-size: 16px; max-width: 480px; margin: 0 auto 20px; }

  .track-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .track-card {
    padding: 16px; border-radius: 16px; background: var(--card);
    border: 2px solid var(--border); cursor: pointer;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .track-card:hover { border-color: var(--track-color); }
  .track-card:active { transform: scale(0.97); }
  .track-card .icon { font-size: 32px; margin-bottom: 8px; }
  .track-card h3 { margin-bottom: 4px; }
  .track-card .subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .track-card .progress {
    height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden;
  }
  .track-card .progress-bar {
    height: 100%; background: var(--track-color);
    transition: width 0.3s;
  }
  .track-card .progress-text {
    font-size: 11px; color: var(--text-dim); margin-top: 4px; font-weight: 600;
  }
  .track-card.cj { --track-color: var(--cj); }
  .track-card.m { --track-color: var(--m); }
  .track-card.aj { --track-color: var(--aj); }
  .track-card.hotel { --track-color: var(--hotel); }

  .goal-card {
    background: var(--card); border: 1px solid var(--border);
    padding: 14px 16px; border-radius: 16px; margin-bottom: 12px;
  }
  .goal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .goal-title { font-size: 15px; font-weight: 700; }
  .goal-count { font-size: 14px; font-weight: 700; color: var(--text-dim); }
  .goal-bar {
    position: relative; height: 10px; background: var(--bg-soft);
    border-radius: 5px; overflow: hidden; margin-bottom: 8px;
  }
  .goal-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--cj));
    transition: width 0.4s ease-out;
  }
  .goal-bar-fill.done {
    background: linear-gradient(90deg, var(--success), var(--warning));
  }
  .goal-bar-milestone {
    position: absolute; top: -2px; width: 2px; height: 14px;
    background: var(--warning); opacity: 0.7;
  }
  .goal-meta { font-size: 12px; color: var(--text-dim); font-weight: 500; }

  .untaught-btn {
    background: rgba(245, 158, 11, 0.15); color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.3);
    padding: 10px 14px; border-radius: 10px; font-size: 13px;
    font-weight: 600; cursor: pointer; margin-top: 12px;
    font-family: inherit; width: 100%;
  }
  .untaught-btn:hover { background: rgba(245, 158, 11, 0.25); }
  .untaught-btn:active { transform: scale(0.98); }

  .lesson-item.untaught { opacity: 0.65; border-color: rgba(245, 158, 11, 0.3); }
  .lesson-item.untaught .num { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
  .lesson-untaught-badge {
    font-size: 10px; font-weight: 700; color: #fbbf24;
    background: rgba(245, 158, 11, 0.15); padding: 2px 6px;
    border-radius: 4px; margin-left: 6px; letter-spacing: 0.5px;
  }

  .daily {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(236, 72, 153, 0.2));
    border: 1px solid rgba(245, 158, 11, 0.3);
    padding: 16px; border-radius: 16px; margin-bottom: 16px;
    cursor: pointer;
  }
  .daily .label { font-size: 12px; font-weight: 700; color: #f59e0b; margin-bottom: 4px; letter-spacing: 1px; }
  .daily h3 { margin-bottom: 4px; }
  .daily.done { opacity: 0.6; }

  .question-card {
    background: var(--card); padding: 20px; border-radius: 16px;
    margin-bottom: 16px; border: 1px solid var(--border);
  }
  .question-num {
    font-size: 12px; color: var(--text-dim); font-weight: 700;
    margin-bottom: 8px; letter-spacing: 1px;
  }
  .question-text {
    font-size: 18px; font-weight: 600; line-height: 1.4; margin-bottom: 20px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg-soft); padding: 14px 16px; border-radius: 12px;
    cursor: pointer; border: 2px solid var(--border);
    transition: all 0.15s; font-size: 15px; font-weight: 500;
  }
  .option:hover { border-color: var(--primary); }
  .option:active { transform: scale(0.98); }
  .option.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
  .option.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.15); }
  .option.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.15); }
  .option.correct::after { content: " ✓"; color: var(--success); font-weight: bold; }
  .option.wrong::after { content: " ✗"; color: var(--danger); font-weight: bold; }

  .progress-top {
    height: 8px; background: var(--border); border-radius: 4px;
    margin-bottom: 16px; overflow: hidden;
  }
  .progress-top-bar {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--cj));
    transition: width 0.3s;
  }

  .feedback {
    padding: 14px 16px; border-radius: 12px; margin-top: 12px;
    font-size: 14px; font-weight: 500;
  }
  .feedback.correct { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
  .feedback.wrong { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

  .result-hero {
    text-align: center; padding: 32px 16px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(99, 102, 241, 0.2));
    border-radius: 20px; margin-bottom: 16px;
  }
  .result-hero .score {
    font-size: 56px; font-weight: 800; margin: 12px 0;
    background: linear-gradient(135deg, #10b981, #6366f1);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .diagnostic-results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .result-item {
    padding: 14px; border-radius: 12px; background: var(--card);
    border: 1px solid var(--border);
  }
  .result-item .name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .result-item .bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .result-item .bar-fill { height: 100%; transition: width 0.5s; }
  .result-item .pct { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .back-btn {
    background: var(--card); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 10px; color: var(--text);
    font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
    font-family: inherit;
  }
  .back-btn:hover { background: var(--card-hover); }

  .lesson-list { display: flex; flex-direction: column; gap: 8px; }
  .lesson-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s;
  }
  .lesson-item:hover { border-color: var(--primary); }
  .lesson-item:active { transform: scale(0.98); }
  .lesson-item .num {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-soft); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .lesson-item.done .num { background: var(--success); color: white; }
  .lesson-item .info { flex: 1; }
  .lesson-item .info .title { font-weight: 600; font-size: 15px; }
  .lesson-item .info .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .lesson-item .arrow { color: var(--text-dim); }

  .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
  .badge {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: var(--bg-soft); border-radius: 12px; font-size: 28px;
    border: 1px solid var(--border); opacity: 0.3;
  }
  .badge.earned { opacity: 1; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(236,72,153,0.2)); border-color: var(--warning); }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); padding: 12px 20px; border-radius: 12px;
    border: 1px solid var(--success); color: var(--success);
    font-weight: 600; font-size: 14px; z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: slideDown 0.3s ease-out;
  }
  @keyframes slideDown {
    from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--text-dim);
  }

  .chip {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px;
    margin-right: 6px;
  }
  .chip.cj { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
  .chip.m { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
  .chip.aj { background: rgba(16, 185, 129, 0.2); color: #10b981; }
  .chip.hotel { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .hero .emoji { font-size: 48px; }
    .hero { padding: 24px 12px; }
    .diagnostic-results { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const TRACKS = {
  cj:    { name: 'Čeština',     icon: '📝', color: 'var(--cj)',    subtitle: 'Pravopis, literatura, sloh' },
  m:     { name: 'Matematika',  icon: '🔢', color: 'var(--m)',     subtitle: 'Počty, geometrie, logika' },
  aj:    { name: 'Angličtina',  icon: '🇬🇧', color: 'var(--aj)',    subtitle: 'Gramatika, slovíčka' },
  hotel: { name: 'Hotelovka',   icon: '🏨', color: 'var(--hotel)', subtitle: 'Všeobecný přehled' }
};

const DIAGNOSTIC = [
  { track: 'cj', q: 'Doplň: B_li jsme v kin_.', options: ['Byli, kině', 'Byly, kině', 'Byli, kínu', 'Bili, kině'], correct: 0, hint: 'Chlapci: -li; lokál slova "kino" je "kině".' },
  { track: 'cj', q: 'Doplň: Vzpomněl si na ___.', options: ['mě', 'mně'], correct: 0, hint: '"Na koho? – na mě." 4. pád = mě.' },
  { track: 'cj', q: 'Která věta má správně čárky?', options: ['Když přišla, dala mu dárek.', 'Když přišla dala mu dárek.', 'Když, přišla dala mu dárek.', 'Když přišla dala, mu dárek.'], correct: 0, hint: 'Vedlejší věta se odděluje čárkou.' },
  { track: 'cj', q: 'Kdo napsal Babičku?', options: ['Božena Němcová', 'Karel Čapek', 'Karel Hynek Mácha', 'Jaroslav Seifert'], correct: 0, hint: 'Klasika českého obrození.' },
  { track: 'cj', q: 'Který slovní druh je slovo "rychle"?', options: ['přídavné jméno', 'příslovce', 'zájmeno', 'částice'], correct: 1, hint: 'Vyjadřuje okolnost – jak?' },

  { track: 'm', q: 'Kolik je 25 % z 80?', options: ['15', '20', '25', '30'], correct: 1, hint: '25 % = čtvrtina.' },
  { track: 'm', q: 'Vyřeš: 3x + 5 = 20. x = ?', options: ['3', '5', '15', '7'], correct: 1, hint: '3x = 15, takže x = 5.' },
  { track: 'm', q: 'Obsah obdélníku se stranami 5 a 8 cm?', options: ['13 cm²', '26 cm²', '40 cm²', '80 cm²'], correct: 2, hint: 'S = a · b.' },
  { track: 'm', q: 'Auto jede 60 km/h. Za kolik hodin ujede 180 km?', options: ['2', '3', '4', '5'], correct: 1, hint: 't = s / v.' },
  { track: 'm', q: 'Ze 40 žáků je 15 dívek. Kolik je to procent?', options: ['15 %', '25 %', '37,5 %', '40 %'], correct: 2, hint: '15/40 = 0,375.' },

  { track: 'aj', q: 'I ___ to school every day.', options: ['go', 'goes', 'went', 'going'], correct: 0, hint: 'Present simple, 1. osoba.' },
  { track: 'aj', q: 'He ___ watching TV yesterday.', options: ['is', 'was', 'were', 'are'], correct: 1, hint: 'Past continuous, 3. osoba jednotného čísla.' },
  { track: 'aj', q: 'Co znamená "breakfast"?', options: ['oběd', 'večeře', 'snídaně', 'svačina'], correct: 2, hint: 'Break + fast = přerušit půst.' },
  { track: 'aj', q: '___ you like pizza?', options: ['Are', 'Is', 'Do', 'Does'], correct: 2, hint: 'Otázka v present simple, "you".' },
  { track: 'aj', q: 'Překlad: "Jak se jmenuješ?"', options: ['How old are you?', "What\u0027s your name?", 'Where are you from?', 'How are you?'], correct: 1, hint: 'Doslova: "Jaké je tvé jméno?"' },

  { track: 'hotel', q: 'Hlavní město Itálie?', options: ['Milán', 'Řím', 'Benátky', 'Florencie'], correct: 1, hint: 'Město na sedmi pahorcích.' },
  { track: 'hotel', q: 'Co je "room service"?', options: ['úklid pokoje', 'donáška jídla na pokoj', 'recepce', 'spropitné'], correct: 1, hint: 'Obsluha přímo na pokoji.' },
  { track: 'hotel', q: 'Kolik krajů má Česká republika?', options: ['12', '13', '14', '15'], correct: 2, hint: '13 + Praha jako samostatný kraj.' },
  { track: 'hotel', q: 'Předkrm se servíruje:', options: ['po hlavním jídle', 'před hlavním jídlem', 'místo hlavního jídla', 's hlavním jídlem'], correct: 1, hint: 'Jmenuje se pře-dkrm.' },
  { track: 'hotel', q: 'Co znamená "all inclusive"?', options: ['jen snídaně', 'polopenze', 'vše v ceně', 'bez stravy'], correct: 2, hint: 'Doslova "vše zahrnuto".' }
];

const LESSONS = {
  cj: [
    {
      id: 'cj-1', title: 'Vyjmenovaná slova po B', difficulty: 1,
      questions: [
        { q: 'Doplň i/y: b_linka v lese', options: ['i', 'y'], correct: 1, hint: 'Bylinka – od "být".' },
        { q: 'Doplň i/y: b_dlo (místo, kde žijeme)', options: ['i', 'y'], correct: 1, hint: 'Bydlo – kde se bydlí.' },
        { q: 'Doplň i/y: b_t či neb_t', options: ['i, i', 'y, y', 'i, y', 'y, i'], correct: 1, hint: 'Vyjmenované slovo "být".' },
        { q: 'Doplň i/y: b_č na prach', options: ['i', 'y'], correct: 0, hint: 'Bič – není ve vyjmenovaných slovech.' },
        { q: 'Doplň i/y: zb_tek peněz', options: ['i', 'y'], correct: 1, hint: 'Od "být" – co zbývá.' }
      ]
    },
    {
      id: 'cj-2', title: 'mě / mně', difficulty: 1,
      questions: [
        { q: 'Vzpomněl si na ___.', options: ['mě', 'mně'], correct: 0, hint: '"Na koho?" – 4. pád = mě.' },
        { q: 'Dal to ___.', options: ['mě', 'mně'], correct: 1, hint: '"Komu?" – 3. pád = mně.' },
        { q: 'Mluvil o ___.', options: ['mě', 'mně'], correct: 1, hint: '"O kom?" – 6. pád = mně.' },
        { q: '___ to nevadí.', options: ['Mě', 'Mně'], correct: 1, hint: '"Komu?" – 3. pád = mně.' },
        { q: 'Viděl ___ na nádraží.', options: ['mě', 'mně'], correct: 0, hint: '"Koho?" – 4. pád = mě.' }
      ]
    },
    {
      id: 'cj-3', title: 'Shoda podmětu s přísudkem', difficulty: 2,
      questions: [
        { q: 'Chlapci běžel_ do lesa.', options: ['y', 'i'], correct: 1, hint: 'Mužský rod životný – i.' },
        { q: 'Květiny vykvetl_ brzo.', options: ['y', 'i'], correct: 0, hint: 'Ženský rod – y.' },
        { q: 'Okna zářil_ ve slunci.', options: ['y', 'a'], correct: 1, hint: 'Střední rod – a.' },
        { q: 'Psi štěkal_ celou noc.', options: ['y', 'i'], correct: 1, hint: 'Mužský rod životný – i.' },
        { q: 'Stroje pracoval_ bez přestávky.', options: ['y', 'i'], correct: 0, hint: 'Mužský rod neživotný – y.' }
      ]
    },
    {
      id: 'cj-4', title: 'Literatura 19. století', difficulty: 2,
      questions: [
        { q: 'Kdo napsal Máj?', options: ['K. H. Mácha', 'B. Němcová', 'J. Neruda', 'K. J. Erben'], correct: 0, hint: 'Největší český romantik.' },
        { q: 'Kytice (sbírka balad) je dílo:', options: ['Máchy', 'Erbena', 'Nerudy', 'Čapka'], correct: 1, hint: 'Balady Polednice, Vodník, Svatební košile...' },
        { q: 'Babička se odehrává:', options: ['v Praze', 'na Starém bělidle', 'v Brně', 'na Moravě'], correct: 1, hint: 'Ratibořické údolí.' },
        { q: 'Jan Neruda psal:', options: ['jen romány', 'povídky a fejetony', 'jen básně', 'divadelní hry'], correct: 1, hint: 'Povídky malostranské.' },
        { q: 'Co je balada?', options: ['veselá báseň', 'báseň s tragickým koncem', 'krátký román', 'divadelní hra'], correct: 1, hint: 'Často s nadpřirozenými prvky a špatným koncem.' }
      ]
    },
    {
      id: 'cj-5', title: 'Slovní druhy', difficulty: 1,
      questions: [
        { q: '"Rychle" je:', options: ['přídavné jméno', 'příslovce', 'sloveso', 'zájmeno'], correct: 1, hint: 'Jak? Rychle.' },

const STATE_KEY = 'mise-hotelovka-v1';
const DAILY_GOAL_MIN = 15;    // minimum otázek pro udržení streaku
const DAILY_GOAL_BONUS = 20;  // cíl pro bonus XP
const DAILY_BONUS_XP = 25;    // kolik XP navíc za splnění bonusu
const WEBHOOK_URL = '';       // Google Apps Script URL – až nasadíme

function defaultState() {
  return {
    xp: 0, streak: 0, lastActiveDate: null,
    diagnosticDone: false,
    diagnosticResults: { cj: 0, m: 0, aj: 0, hotel: 0 },
    completedLessons: [], lessonScores: {},
    badges: [], dailyChallengeDate: null, dailyChallengesCount: 0,
    // Denní cíl otázek
    todayCount: 0, todayDate: null, bonusAwardedDate: null,
    // "Tohle jsme ještě nebrali"
    untaughtLessons: [],        // [{ id, track, title, markedAt }]
    untaughtEvents: [],         // [{ type, lessonId, track, title, ts }]
    pendingSync: [],            // události čekající na odeslání do Sheetu
    // Sync metadata
    lastSaved: null,            // ISO timestamp poslední změny
    deviceId: null              // náhodné ID zařízení (pro debug)
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return defaultState();
    const merged = { ...defaultState(), ...JSON.parse(raw) };
    // Migrace: pokud se dnes už aktivně učila (staré verze), předpokládáme diagnostiku jako započatý denní cíl
    const today = new Date().toDateString();
    if (merged.todayDate == null && merged.lastActiveDate === today && merged.diagnosticDone) {
      merged.todayDate = today;
      merged.todayCount = 20; // diagnostika má 20 otázek
    }
    return merged;
  } catch (e) { return defaultState(); }
}
function saveState() {
  state.lastSaved = new Date().toISOString();
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  syncSave();
}
// Verze bez push na webhook – pro interní použití (migrace, sync merge)
function saveStateLocal() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}
let state = loadState();
if (!state.deviceId) {
  state.deviceId = Math.random().toString(36).slice(2, 10);
  saveStateLocal();
}

// Streak se už nezvyšuje prostým otevřením aplikace —
// zvedá se až ve chvíli, kdy dcera v daný den zodpoví alespoň DAILY_GOAL_MIN otázek.
function resetDailyIfNeeded() {
  const today = new Date().toDateString();
  if (state.todayDate !== today) {
    state.todayDate = today;
    state.todayCount = 0;
  }
}
function checkStreakBadges() {
  if (state.streak >= 3 && !state.badges.includes('streak-3')) earnBadge('streak-3');
  if (state.streak >= 7 && !state.badges.includes('streak-7')) earnBadge('streak-7');
}
function incrementTodayCount() {
  resetDailyIfNeeded();
  const before = state.todayCount;
  state.todayCount++;
  const today = state.todayDate;

  // Překročení denního minima → posuň streak
  if (before < DAILY_GOAL_MIN && state.todayCount >= DAILY_GOAL_MIN) {
    if (state.lastActiveDate !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (state.lastActiveDate === yesterday) state.streak++;
      else state.streak = 1;
      state.lastActiveDate = today;
      toast('🔥 Denní cíl splněn! Série: ' + state.streak);
      checkStreakBadges();
      logEvent('daily-goal-met', { streak: state.streak, count: state.todayCount });
    }
  }
  // Bonus za 20 otázek denně – jen jednou za den
  if (before < DAILY_GOAL_BONUS && state.todayCount >= DAILY_GOAL_BONUS && state.bonusAwardedDate !== today) {
    state.bonusAwardedDate = today;
    addXP(DAILY_BONUS_XP);
    toast('🏆 20 otázek! +' + DAILY_BONUS_XP + ' XP bonus');
    logEvent('daily-bonus', { count: state.todayCount });
  }
  saveState();
}

// ---------- "Tohle jsme ještě nebrali" ----------
function isLessonUntaught(lessonId) {
  return state.untaughtLessons.some(u => u.id === lessonId);
}
function markLessonUntaught(lessonId, track) {
  const lesson = (LESSONS[track] || []).find(l => l.id === lessonId);
  if (!lesson) return;
  if (isLessonUntaught(lessonId)) return;
  state.untaughtLessons.push({
    id: lessonId, track: track, title: lesson.title,
    markedAt: new Date().toISOString()
  });
  logEvent('lesson-untaught', { lessonId, track, title: lesson.title });
  saveState();
  toast('📒 Uloženo: „Tohle jsme ještě nebrali"');
}
function markLessonLearned(lessonId) {
  const u = state.untaughtLessons.find(x => x.id === lessonId);
  if (!u) return;
  state.untaughtLessons = state.untaughtLessons.filter(x => x.id !== lessonId);
  logEvent('lesson-learned', { lessonId: u.id, track: u.track, title: u.title });
  saveState();
  toast('✓ Super! Lekce „' + u.title + '" odemčená.');
}

// ---------- Event log ----------
function logEvent(type, data) {
  const ev = {
    type: type,
    ts: new Date().toISOString(),
    deviceId: state.deviceId,
    ...(data || {})
  };
  state.untaughtEvents.push(ev);
  if (state.untaughtEvents.length > 500) state.untaughtEvents = state.untaughtEvents.slice(-500);
  state.pendingSync.push(ev);
  if (state.pendingSync.length > 500) state.pendingSync = state.pendingSync.slice(-500);
  // Odeslat jednotlivou událost do Sheetu (fire and forget)
  if (WEBHOOK_URL) {
    try {
      fetch(WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        // text/plain je tzv. simple request → projde bez CORS preflight
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'log_event', event: ev })
      }).catch(() => {});
    } catch (e) {}
  }
}

// ---------- Cross-device sync přes Google Sheet ----------
let _syncTimer = null;
function syncSave() {
  if (!WEBHOOK_URL) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    try {
      fetch(WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'save_state', state: state })
      }).catch(() => {});
    } catch (e) {}
  }, 1500); // debounce 1.5s
}

async function syncLoad() {
  if (!WEBHOOK_URL) return false;
  try {
    const res = await fetch(WEBHOOK_URL + '?action=load', {
      method: 'GET',
      redirect: 'follow'
    });
    if (!res.ok) return false;
    const json = await res.json();
    if (!json || !json.ok || !json.state) return false;
    const remote = json.state;
    const localTs = state.lastSaved ? new Date(state.lastSaved).getTime() : 0;
    const remoteTs = remote.lastSaved ? new Date(remote.lastSaved).getTime() : 0;
    if (remoteTs > localTs) {
      // remote je novější – přepíšeme
      state = { ...defaultState(), ...remote, deviceId: state.deviceId };
      saveStateLocal();
      return true;
    } else if (localTs > remoteTs) {
      // local je novější – push na server
      syncSave();
    }
    return false;
  } catch (e) {
    console.warn('syncLoad failed', e);
    return false;
  }
}
function level() { return Math.floor(state.xp / 100) + 1; }
function xpInLevel() { return state.xp % 100; }
function addXP(amount) {
  const before = level();
  state.xp += amount;
  const after = level();
  saveState();
  if (after > before) {
    toast('🎉 Level ' + after + '!');
    if (after >= 5 && !state.badges.includes('level-5')) earnBadge('level-5');
  }
}
function earnBadge(id) {
  if (state.badges.includes(id)) return;
  state.badges.push(id);
  saveState();
  const badge = BADGES.find(b => b.id === id);
  if (badge) toast(badge.icon + ' Odznak: ' + badge.name);
}
function trackProgress(trackKey) {
  const total = LESSONS[trackKey].length;
  const done = LESSONS[trackKey].filter(l => state.completedLessons.includes(l.id)).length;
  return { done, total, pct: total ? (done / total) * 100 : 0 };
}

function finishDiagnostic(answers) {
  const results = { cj: { c: 0, t: 0 }, m: { c: 0, t: 0 }, aj: { c: 0, t: 0 }, hotel: { c: 0, t: 0 } };
  answers.forEach(a => { results[a.track].t++; if (a.correct) results[a.track].c++; });
  state.diagnosticResults = {
    cj: results.cj.t ? Math.round((results.cj.c / results.cj.t) * 100) : 0,
    m: results.m.t ? Math.round((results.m.c / results.m.t) * 100) : 0,
    aj: results.aj.t ? Math.round((results.aj.c / results.aj.t) * 100) : 0,
    hotel: results.hotel.t ? Math.round((results.hotel.c / results.hotel.t) * 100) : 0
  };
  state.diagnosticDone = true;
  const totalCorrect = answers.filter(a => a.correct).length;
  addXP(totalCorrect * 5);
  earnBadge('diagnostic');
  saveState();
  go('diagnostic-result', { total: totalCorrect, max: answers.length });
}

function finishLesson(track, lessonId, answers) {
  const correct = answers.filter(a => a.correct).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);
  const wasNew = !state.completedLessons.includes(lessonId);
  if (wasNew) state.completedLessons.push(lessonId);
  state.lessonScores[lessonId] = Math.max(state.lessonScores[lessonId] || 0, pct);
  const gained = 10 + correct * 2 + (pct === 100 ? 20 : 0);
  addXP(gained);
  if (state.completedLessons.length === 1) earnBadge('first-lesson');
  if (pct === 100) earnBadge('perfect');
  const tp = trackProgress(track);
  if (tp.done === tp.total) earnBadge(track + '-done');
  const allDone = Object.keys(TRACKS).every(k => {
    const p = trackProgress(k);
    return p.done === p.total;
  });
  if (allDone) earnBadge('all-tracks');
  saveState();
  go('lesson-result', { track, lessonId, correct, total, pct, gained });
}

function renderDaily(params) {
  params = params || {};
  const today = new Date().toDateString();
  // Fond otázek: diagnostika + lekce, které nejsou označené jako "ještě nebrali"
  const allQ = DIAGNOSTIC.map(x => ({ ...x, _src: 'diag' }));
  Object.entries(LESSONS).forEach(([trackKey, arr]) => {
    arr.forEach(l => {
      if (isLessonUntaught(l.id)) return; // přeskoč neprobrané
      l.questions.forEach(qq => allQ.push({ ...qq, track: trackKey, _lessonId: l.id }));
    });
  });
  let q;
  if (typeof params.qIdx === 'number' && allQ[params.qIdx]) {
    q = allQ[params.qIdx];
  } else {
    let hash = 0;
    for (let i = 0; i < today.length; i++) hash = (hash * 31 + today.charCodeAt(i)) | 0;
    q = allQ[Math.abs(hash) % allQ.length];
  }
  const wrap = document.createElement('div');
  wrap.innerHTML =
    '<button class="back-btn" onclick="go(\u0027home\u0027)">← Dashboard</button>' +
    '<div class="hero" style="padding:20px">' +
      '<div class="emoji" style="font-size:40px">📅</div>' +
      '<h2>Denní výzva</h2>' +
      '<p>2× XP bonus</p>' +
    '</div>' +
    '<div class="question-card">' +
      '<div class="question-num"><span class="chip ' + q.track + '">' + TRACKS[q.track].name + '</span></div>' +
      '<div class="question-text">' + q.q + '</div>' +
      '<div class="options">' +
        q.options.map((opt, i) => '<div class="option" data-idx="' + i + '">' + opt + '</div>').join('') +
      '</div>' +
      (q._lessonId
        ? '<button class="untaught-btn" id="untaught-btn">📒 Tohle jsme ještě nebrali</button>'
        : '') +
      '<div id="feedback"></div>' +
    '</div>';
  const untaughtBtn = wrap.querySelector('#untaught-btn');
  if (untaughtBtn) {
    untaughtBtn.onclick = () => {
      const lesson = (LESSONS[q.track] || []).find(l => l.id === q._lessonId);
      if (!lesson) return;
      if (!confirm('Označit celou lekci „' + lesson.title + '" jako neprobranou a vygenerovat jinou otázku?')) return;
      markLessonUntaught(q._lessonId, q.track);
      // Spočítat nový index v novém fondu
      const nextPool = DIAGNOSTIC.map(x => ({ ...x, _src: 'diag' }));
      Object.entries(LESSONS).forEach(([trackKey, arr]) => {
        arr.forEach(l => {
          if (isLessonUntaught(l.id)) return;
          l.questions.forEach(qq => nextPool.push({ ...qq, track: trackKey, _lessonId: l.id }));
        });
      });
      let hash = Date.now() | 0;
      const newIdx = nextPool.length ? (Math.abs(hash) % nextPool.length) : 0;
      go('daily', { qIdx: newIdx });
    };
  }
  let answered = false;
  wrap.querySelectorAll('.option').forEach(el => {
    el.onclick = () => {
      if (answered) return;
      answered = true;
      const selected = parseInt(el.dataset.idx);
      wrap.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
      wrap.querySelectorAll('.option').forEach((o, i) => {
        if (i === q.correct) o.classList.add('correct');
        if (i === selected && selected !== q.correct) o.classList.add('wrong');
      });
      const correct = selected === q.correct;
      const gained = correct ? 20 : 5;
      addXP(gained);
      incrementTodayCount();
      const ubtn = wrap.querySelector('#untaught-btn');
      if (ubtn) ubtn.style.display = 'none';
      state.dailyChallengeDate = today;
      state.dailyChallengesCount++;
      if (state.dailyChallengesCount >= 5) earnBadge('daily-5');
      saveState();
      const fb = wrap.querySelector('#feedback');
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.style.marginTop = '12px';
      btn.textContent = 'Zpět na dashboard →';
      btn.onclick = () => go('home');
      fb.innerHTML =
        '<div class="feedback ' + (correct ? 'correct' : 'wrong') + '">' +
          (correct ? '✓ Správně! +20 XP' : '✗ Správně: ' + q.options[q.correct] + ' · +5 XP za pokus') +
          (q.hint ? '<br><span style="font-weight:400;color:var(--text-dim);font-size:13px">💡 ' + q.hint + '</span>' : '') +
        '</div>';
      fb.appendChild(btn);
    };
  });
  return wrap;
}

function renderUntaught() {
  const wrap = document.createElement('div');
  const list = state.untaughtLessons;
  if (!list.length) {
    wrap.innerHTML =
      '<button class="back-btn" onclick="go(\u0027home\u0027)">← Dashboard</button>' +
      '<div class="hero" style="padding:20px">' +
        '<div class="emoji" style="font-size:40px">📒</div>' +
        '<h2>Co jsme ještě nebrali</h2>' +
        '<p>Zatím nic. Všechno, co ti přijde, zvládáš — nebo to aspoň nezavrhuješ. 🙌</p>' +
      '</div>';
    return wrap;
  }
  wrap.innerHTML =
    '<button class="back-btn" onclick="go(\u0027home\u0027)">← Dashboard</button>' +
    '<div class="hero" style="padding:20px">' +
      '<div class="emoji" style="font-size:40px">📒</div>' +
      '<h2>Co jsme ještě nebrali</h2>' +
      '<p>' + list.length + ' ' + (list.length === 1 ? 'lekce čeká' : (list.length < 5 ? 'lekce čekají' : 'lekcí čeká')) + ' na probrání s rodičem / učitelkou. Až látku projdete, klikni „Už to umím" — lekce se vrátí mezi ostatní.</p>' +
    '</div>' +
    '<div class="lesson-list">' +
      list.map(u => {
        const t = TRACKS[u.track] || { name: u.track, icon: '📚' };
        const when = (() => {
          try { return new Date(u.markedAt).toLocaleDateString('cs-CZ'); }
          catch (e) { return ''; }
        })();
        return '<div class="lesson-item untaught" style="cursor:default">' +
          '<div class="num">' + t.icon + '</div>' +
          '<div class="info">' +
            '<div class="title">' + u.title + '</div>' +
            '<div class="meta">' + t.name + (when ? ' · uloženo ' + when : '') + '</div>' +
          '</div>' +
          '<button class="btn success" style="width:auto;padding:8px 12px;font-size:13px" onclick="__markLearned(\u0027' + u.id + '\u0027)">Už to umím</button>' +
        '</div>';
      }).join('') +
    '</div>' +
    '<div class="card" style="margin-top:16px">' +
      '<h3 style="margin-bottom:8px">Pro rodiče</h3>' +
      '<p style="font-size:13px">Tento seznam je signál, jakým tématům se věnovat společně. ' +
      'Seznam se také posílá do Google Sheetu (až bude nakonfigurováno), abyste měli přehled i mimo aplikaci.</p>' +
    '</div>';
  return wrap;
}
window.__markLearned = function(lessonId) {
  if (!confirm('Označit lekci jako zvládnutou a vrátit ji mezi ostatní?')) return;
  markLessonLearned(lessonId);
  render();
};

function renderBadges() {
  const wrap = document.createElement('div');
  wrap.innerHTML =
    '<button class="back-btn" onclick="go(\u0027home\u0027)">← Dashboard</button>' +
    '<div class="hero" style="padding:20px">' +
      '<div class="emoji" style="font-size:40px">🏅</div>' +
      '<h2>Odznaky</h2>' +
      '<p>' + state.badges.length + ' / ' + BADGES.length + ' získaných</p>' +
    '</div>' +
    '<div class="card">' +
      '<div class="badge-grid" style="grid-template-columns: repeat(3, 1fr); gap:12px">' +
        BADGES.map(b =>
          '<div style="text-align:center">' +
            '<div class="badge ' + (state.badges.includes(b.id) ? 'earned' : '') + '" style="margin-bottom:6px">' + b.icon + '</div>' +
            '<div style="font-size:11px;font-weight:600;color:' + (state.badges.includes(b.id) ? 'var(--text)' : 'var(--text-dim)') + '">' + b.name + '</div>' +
          '</div>'
        ).join('') +
      '</div>' +
    '</div>';
  return wrap;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// Při startu: zkusit natáhnout novější stav z cloudu, pak reset denního počítadla + render
resetDailyIfNeeded();
saveStateLocal();
checkStreakBadges();
render();
// Background sync: po načtení zkusíme tahnout cloud, a pokud je novější, překreslíme
if (WEBHOOK_URL) {
  syncLoad().then(updated => {
    if (updated) {
      toast('🔄 Načteno z druhého zařízení');
      resetDailyIfNeeded();
      saveStateLocal();
      render();
    }
  });
}
</script>
</body>
</html>
